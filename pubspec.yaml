name: myfinance_tracker
description: MyFinance Tracker - Personal Finance Manager
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Database
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # State Management
  provider: ^6.1.2

  # Charts
  fl_chart: ^0.68.0

  # Settings
  shared_preferences: ^2.3.2

  # Biometric / App Lock
  local_auth: ^2.3.0

  # Date/time
  intl: ^0.19.0

  # Photo picker
  image_picker: ^1.1.2

  # File system
  path_provider: ^2.1.4
  file_picker: ^8.1.2

  # Calendar widget
  table_calendar: ^3.1.2

  # Notifications + timezone
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  flutter_timezone: ^1.0.4

  # Unique IDs
  uuid: ^4.5.0

  # CSV
  csv: ^6.0.0

  # Permissions
  permission_handler: ^11.3.1

  # PDF export
  pdf: ^3.11.1
  printing: ^5.13.1

  # Excel export
  excel: ^4.0.6

  # Share sheet
  share_plus: ^10.0.2

  # App info
  package_info_plus: ^8.1.1

  # URL Launcher (LinkedIn, SMS)
  url_launcher: ^6.3.1

  # Google Sign-In + Firebase (full suite)
  google_sign_in: ^6.2.1
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
